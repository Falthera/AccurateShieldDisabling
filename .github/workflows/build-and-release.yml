name: Build and Release Fabric Mod

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.1). Leave empty to auto-bump patch from current mod_version.'
        required: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            CURRENT=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2)
            MAJOR=$(echo "$CURRENT" | cut -d'.' -f1)
            MINOR=$(echo "$CURRENT" | cut -d'.' -f2)
            PATCH=$(echo "$CURRENT" | cut -d'.' -f3)
            PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Using version: ${VERSION}"

      - name: Update mod version
        run: |
          sed -i "s/^mod_version=.*/mod_version=${{ steps.version.outputs.version }}/" gradle.properties
          cat gradle.properties

      - name: Build with Gradle
        uses: gradle/gradle-build-action@v4
        with:
          gradle-version: 9.5.0
          arguments: build
          cache-read-only: false

      - name: Create tag and GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          files: build/libs/*.jar
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
